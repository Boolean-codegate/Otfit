server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Flutter 웹 SPA 라우팅: 없는 경로는 index.html로
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 해시된 정적 자산 캐싱
    location ~* \.(js|wasm|css|png|jpg|jpeg|webp|ttf|otf|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}
