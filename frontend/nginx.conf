server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Flutter 웹 SPA 라우팅: 없는 경로는 index.html로
    location / {
        try_files $uri $uri/ /index.html;
        # main.dart.js 등은 파일명이 고정이라 캐시하면 배포 갱신이 안 퍼진다
        add_header Cache-Control "no-cache";
    }

    # 버전 폴더가 있는 canvaskit·폰트·이미지 자산만 캐싱
    location ~* ^/(canvaskit/|assets/|icons/) {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}
