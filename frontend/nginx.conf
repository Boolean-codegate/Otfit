server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Flutter 웹 SPA 라우팅: 없는 경로는 index.html로
    location / {
        try_files $uri $uri/ /index.html;
        # main.dart.js 등은 파일명이 고정이라 캐시하면 배포 갱신이 안 퍼진다
        add_header Cache-Control "no-cache";
    }

    # Flutter 웹은 자산 경로에 콘텐츠 해시가 없어 장기 캐시하면 배포 갱신이 안 퍼진다.
    # 데모는 정확성이 우선 — 전부 no-cache (304 재검증으로 대역폭은 충분히 절약됨).
}
