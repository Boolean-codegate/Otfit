<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OTFIT — 로그인</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:"Apple SD Gothic Neo",Pretendard,sans-serif; }
  body { min-height:100vh; display:flex; align-items:center; justify-content:center;
         background:linear-gradient(135deg,#f6f5ff 0%,#eefcfa 100%); }
  .card { width:410px; background:#fff; border-radius:22px; padding:38px 34px 30px;
          box-shadow:0 18px 50px rgba(90,70,180,.14); }
  .brand { display:flex; flex-direction:column; align-items:center; gap:12px; margin-bottom:6px; }
  .brand .icon { width:64px; height:64px; }
  .brand .word { height:30px; }
  .sub { text-align:center; color:#8a90a3; font-size:12.5px; margin:6px 0 24px; }

  .sbtn { display:flex; align-items:center; justify-content:center; gap:10px; width:100%;
          padding:13px; border-radius:12px; font-size:14.5px; font-weight:700; cursor:pointer;
          border:1.5px solid transparent; margin-bottom:10px; }
  .sbtn:hover { filter:brightness(.97); }
  .kakao { background:#FEE500; color:#191919; }
  .google { background:#fff; color:#3c4043; border-color:#dadce0; }
  #googleSlot { margin-bottom:10px; display:flex; justify-content:center; }

  .divider { display:flex; align-items:center; gap:10px; color:#c2c6d4; font-size:11.5px; margin:16px 0 6px; }
  .divider::before,.divider::after { content:""; flex:1; height:1px; background:#eceef5; }

  label { display:block; font-size:12px; color:#8a90a3; margin:12px 0 5px; }
  input { width:100%; padding:12px 13px; border:1.5px solid #e4e6ef; border-radius:10px; font-size:14px; }
  input:focus { outline:none; border-color:#6d4fd1; }
  .primary { width:100%; margin-top:18px; padding:13px; border:0; border-radius:12px;
             background:linear-gradient(135deg,#6d4fd1,#4ecdc4); color:#fff; font-size:15px;
             font-weight:800; cursor:pointer; }
  .primary:hover { filter:brightness(1.07); }
  .switch { margin-top:12px; text-align:center; font-size:12.5px; color:#8a90a3; }
  .switch a { color:#6d4fd1; font-weight:700; cursor:pointer; text-decoration:none; }
  .msg { margin-top:12px; font-size:13px; text-align:center; min-height:18px; }
  .msg.err { color:#e0455a; } .msg.ok { color:#1b9e77; }

  .me { display:none; text-align:center; }
  .me .hello { font-size:20px; font-weight:800; margin:10px 0 2px; color:#372f6b; }
  .me .email { color:#8a90a3; font-size:13px; }
  .credit { margin:18px auto; width:max-content; background:#f6f5ff; border:1.5px solid #e4defc;
            color:#6d4fd1; font-weight:800; border-radius:24px; padding:9px 20px; font-size:15px; }
  .row { display:flex; gap:8px; margin-top:6px; }
  .row button { flex:1; padding:11px; border:1.5px solid #e4e6ef; background:#fff; border-radius:10px;
                font-size:13px; cursor:pointer; color:#372f6b; font-weight:700; }
  .devtool { margin-top:16px; border-top:1px dashed #eceef5; padding-top:10px; }
  .devtool summary { font-size:11.5px; color:#c2c6d4; cursor:pointer; }
  .devtool input { margin-top:8px; font-size:12px; }
  .devtool button { margin-top:8px; width:100%; padding:9px; font-size:12px; border:1.5px solid #e4e6ef;
                    border-radius:8px; background:#fff; cursor:pointer; color:#372f6b; }
  .foot { margin-top:16px; text-align:center; color:#c2c6d4; font-size:11px; }
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <img class="icon" src="assets/appicon.png" alt="OTFIT 아이콘" />
    <img class="word" src="assets/wordmark.png" alt="OTFIT" />
  </div>
  <div class="sub">사진을 보정하다가, 사고 싶어진다</div>

  <div id="authBox">
    <button class="sbtn kakao" id="btnKakao">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#191919" d="M12 3C6.48 3 2 6.54 2 10.9c0 2.8 1.86 5.26 4.66 6.65-.15.52-.97 3.36-1 3.58 0 0-.02.17.09.24.11.07.24.02.24.02.32-.05 3.66-2.4 4.24-2.81.57.08 1.16.13 1.77.13 5.52 0 10-3.54 10-7.9S17.52 3 12 3z"/></svg>
      카카오로 시작하기
    </button>
    <div id="googleSlot"></div>
    <button class="sbtn google" id="btnGoogle">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Google로 계속하기
    </button>

    <div class="divider">또는 이메일로</div>

    <div id="joinOnly" style="display:none">
      <label>닉네임</label>
      <input id="nickname" placeholder="닉네임" />
    </div>
    <label>이메일</label>
    <input id="email" type="email" placeholder="you@otfit.app" value="test@otfit.app" />
    <label>비밀번호</label>
    <input id="password" type="password" placeholder="8자 이상" value="test1234" />
    <button class="primary" id="btnSubmit">로그인</button>
    <div class="switch" id="switchLine">아직 계정이 없나요? <a id="linkSwitch">회원가입</a></div>
    <div class="msg" id="msg"></div>

    <details class="devtool">
      <summary>개발자 도구 — 소셜 토큰 직접 테스트</summary>
      <input id="rawToken" placeholder="카카오 access_token 또는 구글 id_token 붙여넣기" />
      <button id="btnRawKakao">카카오 토큰으로 로그인</button>
      <button id="btnRawGoogle">구글 토큰으로 로그인</button>
    </details>
  </div>

  <div class="me" id="meBox">
    <div class="hello" id="meNick"></div>
    <div class="email" id="meEmail"></div>
    <div class="credit" id="meCredit"></div>
    <div class="row">
      <button id="btnMe">내 정보 새로고침</button>
      <button id="btnLogout">로그아웃</button>
    </div>
    <button class="primary" style="margin-top:12px" onclick="location.href='home.html'">홈 피드로 가기 →</button>
    <div class="msg ok" id="msg2"></div>
  </div>

  <div class="foot">OTFIT · API localhost:8000 · 소셜 키는 index.html 상단 CONFIG에 입력</div>
</div>

<script>
// ─────────────────────────────────────────────────────────────
// CONFIG: 콘솔에서 발급받은 키를 여기 넣으면 소셜 버튼이 실제로 동작한다
//  - KAKAO_JS_KEY : 카카오 developers > 앱 키 > JavaScript 키 (플랫폼 Web에 http://localhost:8090 등록)
//  - GOOGLE_CLIENT_ID : GCP > OAuth 웹 클라이언트 ID (승인된 JavaScript 원본에 http://localhost:8090 추가)
// ─────────────────────────────────────────────────────────────
const KAKAO_JS_KEY = "";
const GOOGLE_CLIENT_ID = "";
const API = "http://localhost:8000";

let mode = "login";
let access = localStorage.getItem("otfit_access") || null;
const $ = (id) => document.getElementById(id);
const msg = (t, ok=false) => { const m=$("msg"); m.textContent=t; m.className="msg "+(ok?"ok":"err"); };

async function api(path, opts={}) {
  const res = await fetch(API+path, {
    headers: { "Content-Type":"application/json", ...(access?{Authorization:"Bearer "+access}:{}) },
    ...opts,
  });
  const body = await res.json().catch(()=>({}));
  if (!res.ok) throw new Error(body?.error?.message || ("HTTP "+res.status));
  return body;
}

function loginSuccess(body, note) {
  access = body.access_token;
  localStorage.setItem("otfit_access", access);
  showMe(body.user, note);
}

async function socialLogin(provider, token, note) {
  try {
    msg(provider + " 로그인 중…", true);
    const body = await api("/auth/social", {method:"POST", body:JSON.stringify({provider, token})});
    loginSuccess(body, note || (provider + " 로그인 성공"));
  } catch(e) { msg(e.message); }
}

// ── 이메일 로그인/가입 ──
$("linkSwitch").onclick = () => setMode(mode==="login" ? "join" : "login");
function setMode(m) {
  mode = m;
  $("joinOnly").style.display = m==="join" ? "block" : "none";
  $("btnSubmit").textContent = m==="login" ? "로그인" : "가입하고 10크레딧 받기";
  $("switchLine").innerHTML = m==="login"
    ? '아직 계정이 없나요? <a id="linkSwitch">회원가입</a>'
    : '이미 계정이 있나요? <a id="linkSwitch">로그인</a>';
  $("linkSwitch").onclick = () => setMode(mode==="login" ? "join" : "login");
  msg("");
}
$("btnSubmit").onclick = async () => {
  try {
    msg(mode==="login" ? "로그인 중…" : "가입 중…", true);
    const payload = { email:$("email").value.trim(), password:$("password").value };
    const body = mode==="login"
      ? await api("/auth/login", {method:"POST", body:JSON.stringify(payload)})
      : await api("/auth/register", {method:"POST", body:JSON.stringify({...payload, nickname:$("nickname").value.trim()||"오핏유저"})});
    loginSuccess(body, mode==="join" ? "가입 완료! 보너스 크레딧 지급 🎉" : "로그인 성공");
  } catch(e) { msg(e.message); }
};

// ── 카카오 ──
if (KAKAO_JS_KEY) {
  const s = document.createElement("script");
  s.src = "https://t1.kakaocdn.net/kakao_js_sdk/2.7.4/kakao.min.js";
  s.onload = () => Kakao.init(KAKAO_JS_KEY);
  document.head.appendChild(s);
}
$("btnKakao").onclick = () => {
  if (!KAKAO_JS_KEY) {
    msg("KAKAO_JS_KEY 미설정 — 카카오 developers에서 JavaScript 키 발급 후 index.html CONFIG에 입력하세요. (앱에서는 Flutter SDK 사용)", true);
    return;
  }
  // 웹 SDK v2는 리다이렉트 인가코드 방식 — 데모 페이지는 토큰 직접 테스트(개발자 도구) 권장
  Kakao.Auth.authorize({ redirectUri: location.origin + location.pathname });
};

// ── 구글 (Google Identity Services) ──
if (GOOGLE_CLIENT_ID) {
  $("btnGoogle").style.display = "none";
  const s = document.createElement("script");
  s.src = "https://accounts.google.com/gsi/client";
  s.onload = () => {
    google.accounts.id.initialize({
      client_id: GOOGLE_CLIENT_ID,
      callback: (res) => socialLogin("google", res.credential, "구글 로그인 성공"),
    });
    google.accounts.id.renderButton($("googleSlot"), { theme:"outline", size:"large", width:340, text:"continue_with" });
  };
  document.head.appendChild(s);
} else {
  $("btnGoogle").onclick = () =>
    msg("GOOGLE_CLIENT_ID 미설정 — GCP OAuth 웹 클라이언트 ID를 index.html CONFIG에 입력하면 진짜 구글 로그인이 뜹니다.", true);
}

// ── 개발자 도구: 토큰 직접 테스트 (카카오 토큰 도구에서 발급받은 토큰으로 전체 플로우 검증) ──
$("btnRawKakao").onclick = () => socialLogin("kakao", $("rawToken").value.trim(), "카카오 토큰 검증 → 로그인 성공");
$("btnRawGoogle").onclick = () => socialLogin("google", $("rawToken").value.trim(), "구글 토큰 검증 → 로그인 성공");

// ── 내 정보 ──
function showMe(user, note) {
  $("authBox").style.display="none";
  $("meBox").style.display="block";
  $("meNick").textContent = user.nickname + " 님, 환영해요";
  $("meEmail").textContent = user.email;
  $("meCredit").textContent = "✨ 보정 크레딧 " + user.credit_balance;
  $("msg2").textContent = note || "";
}
$("btnMe").onclick = async () => {
  try { showMe(await api("/me"), "방금 서버에서 새로 불러옴"); } catch(e){ $("msg2").textContent=e.message; }
};
$("btnLogout").onclick = () => {
  access=null; localStorage.removeItem("otfit_access");
  $("meBox").style.display="none"; $("authBox").style.display="block"; msg("로그아웃 되었습니다", true);
};
if (access) api("/me").then(u=>showMe(u,"자동 로그인")).catch(()=>{ access=null; localStorage.removeItem("otfit_access"); });
</script>
</body>
</html>
